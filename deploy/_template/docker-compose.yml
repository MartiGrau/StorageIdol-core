# StorageIdol Client Deployment Template
# Generated by scripts/provision-client.sh — do not edit manually
# Replace <CLIENT_ID> and <VERSION> before deploying

services:
  # ── Platform services ────────────────────────────────────────────────────────
  api:
    image: registry.storageidol.com/platform-api:<VERSION>
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENT_ID: <CLIENT_ID>
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agents:
    image: registry.storageidol.com/platform-agents:<VERSION>
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENT_ID: <CLIENT_ID>
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3

  agents-beat:
    image: registry.storageidol.com/platform-agents:<VERSION>
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENT_ID: <CLIENT_ID>
    command: celery -A tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  # ── Per-client MCP (built from clients/<CLIENT_ID>/mcp) ──────────────────────
  mcp:
    image: registry.storageidol.com/mcp-<CLIENT_ID>:<VERSION>
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Voice agent (LiveKit worker — handles inbound + outbound SIP) ─────────────
  voice:
    image: registry.storageidol.com/platform-voice:<VERSION>
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENT_ID: <CLIENT_ID>
    depends_on:
      - agents

  # ── Client-facing dashboard ──────────────────────────────────────────────────
  dashboard:
    image: registry.storageidol.com/platform-dashboard:<VERSION>
    restart: unless-stopped
    env_file: .env
    environment:
      CLIENT_ID: <CLIENT_ID>
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Data layer ───────────────────────────────────────────────────────────────
  # NOTE: The primary application database is EXTERNAL and managed by the client.
  # It is NOT a container in this stack. The api/agents/voice services connect to it
  # via DATABASE_URL in .env (a managed PostgreSQL 16+ with the pgvector extension —
  # e.g. AWS RDS, Supabase, Neon, Hetzner managed Postgres, Cloud SQL, Azure DB).
  # This keeps durable client data (conversations, PII, KB embeddings) decoupled from
  # the stateless container server: if this server is lost, redeploy and reconnect —
  # no data loss. See context/operations/database.md.
  #
  # Redis is intentionally kept local: it is an ephemeral Celery broker / cache.
  # Losing it on server failure costs only in-flight tasks, not durable data.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability: Langfuse (self-hosted) ─────────────────────────────────────
  langfuse-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER}:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB}
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ops@storageidol.com
    ports:
      - "3001:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy

  # ── Monitoring sidecars ───────────────────────────────────────────────────────
  watchdog:
    image: registry.storageidol.com/watchdog:<VERSION>
    restart: always
    env_file: .env
    environment:
      CLIENT_ID: <CLIENT_ID>
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - api

  # NOTE: Watchtower (auto-pull) is intentionally excluded from this template.
  # Auto-pulling new image versions in production bypasses manual approval and breaks
  # pinned versions. New versions are deployed via the GitHub Actions deploy workflow
  # with a manual approval gate. See context/operations/deployment.md.

volumes:
  redis_data:
  langfuse_postgres_data:
