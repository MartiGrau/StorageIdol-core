[project]
name = "storageidol-voice"
version = "0.1.0"
description = "LiveKit Agents voice pipeline: Deepgram STT → Claude → ElevenLabs TTS"
requires-python = ">=3.11"
dependencies = [
    "livekit-agents>=0.12",
    "livekit-plugins-deepgram>=0.12",
    "livekit-plugins-elevenlabs>=0.12",
    "livekit-plugins-anthropic>=0.12",
    "livekit-plugins-silero>=0.12",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
