[project]
name = "storageidol-db"
version = "0.1.0"
description = "Shared SQLAlchemy 2 models, session factory, and Alembic migrations"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic>=2.0",
    "pgvector>=0.3",
    "python-ulid>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-postgresql>=6.0",
]
