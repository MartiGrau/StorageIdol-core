[project]
name = "storageidol-whatsapp"
version = "0.1.0"
description = "WhatsApp Cloud API client: send text, templates, media; parse webhooks"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "tenacity>=8.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]
