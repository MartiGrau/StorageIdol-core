# Client Configuration Template
# Generated by provision-client agent — fill in all <PLACEHOLDER> values
# This file is NOT a secret — it contains non-sensitive settings only
# Secrets (API keys, passwords) live in .env on the client server

client_id: <CLIENT_ID>
brand_name: <BRAND_NAME>           # Used in agent responses: "Hola, soy el asistente de X"
language: es                        # BCP 47 language code
timezone: Europe/Madrid

# ── Modules enabled ──────────────────────────────────────────────────────────
modules:
  customer_service: true
  debt_collection: true
  lead_management: false            # Enable when ready
  voice: false                      # Enable when Telnyx phone number is provisioned

# ── Agent modules composition ────────────────────────────────────────────────
agent:
  intent_classifier: storage        # Options: storage | financial | generic
  auth_method: phone_dni            # Options: phone_dni | email_id | none
  debt_behavior: soft               # Options: soft | hard

# ── Voice settings ────────────────────────────────────────────────────────────
# Runtime: LiveKit Agents (STT → LLM → TTS pipeline)
# PSTN / phone numbers: Telnyx SIP trunk (Spanish +34 numbers — LiveKit does not provision ES DIDs)
voice:
  elevenlabs_voice_id: <VOICE_ID>          # Get from ElevenLabs voice library
  stt_provider: deepgram                    # deepgram | assemblyai
  language: es-ES
  speed: 1.0
  sip_trunk_provider: telnyx                # telnyx | sinch | twilio_sip (for PSTN connectivity only)
  sip_number: <E164_PHONE_ES>               # e.g. +34912345678 — provisioned in Telnyx
  inbound_transfer_number: <HUMAN_AGENT_NUMBER>  # Forward overflow/escalated calls here

# ── Debt collection ───────────────────────────────────────────────────────────
debt:
  stages:
    - day: 3
      template: <CLIENT_ID>_debt_d3
      channel: [whatsapp, sms]
    - day: 10
      template: <CLIENT_ID>_debt_d10
      channel: [whatsapp]
    - day: 20
      template: <CLIENT_ID>_debt_d20
      channel: [whatsapp, voice]
    - day: 30
      template: <CLIENT_ID>_debt_d30
      channel: [whatsapp, voice]
  payment_link_base: <PAYMENT_PORTAL_URL>

# ── Escalation ────────────────────────────────────────────────────────────────
escalation:
  webhook_url: <SLACK_OR_TEAMS_WEBHOOK>
  contacts:
    - name: <NAME>
      role: agent
      phone: <PHONE>
      hours: "Mon-Fri 9:00-19:00 Europe/Madrid"
  triggers:
    - "client mentions legal action"
    - "client says they already paid"
    - "client requests to speak with human"
    - "3+ unresolved turns on same intent"

# ── Knowledge base ────────────────────────────────────────────────────────────
knowledge_base:
  path: knowledge-base/
  embedding_model: text-embedding-3-small

# ── Model overrides (optional — falls back to platform defaults in packages/llm) ──
# Uncomment to override the model tier for specific tasks for this client.
# Use task keys: classification | conversation | reasoning | judge
# model_overrides:
#   conversation: claude-haiku-4-5-20251001   # downgrade for cost savings
#   reasoning: claude-sonnet-4-6              # downgrade Opus if overkill for this client

# ── EU AI Act Art. 50 — AI identity disclosure (mandatory) ────────────────────
# The presence of this disclosure is enforced by channel/formatter.py.
# The wording is configurable — but it cannot be removed.
disclosure:
  voice_greeting: "Esta llamada puede ser atendida por un asistente de inteligencia artificial en nombre de {brand_name}. Si prefiere hablar con una persona, dígalo en cualquier momento."
  whatsapp_first_message: "Hola 👋 Soy un asistente de inteligencia artificial de *{brand_name}*. Estoy aquí para ayudarte. ¿En qué puedo ayudarte hoy?"
